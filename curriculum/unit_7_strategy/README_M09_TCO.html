            --text-muted: #94A3B8;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.1);

        * { box-sizing: border-box; margin: 0; padding: 0; }

            justify-content: center;
            align-items: center;

        .grid-bg {

            background-size: 80px 80px;
            z-index: 1;
        }
        .glow-radial {
            position: fixed;
            top: 50%; left: 50%;
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.04) 0%, rgba(255, 91, 53, 0.02) 60%, transparent 100%);
            filter: blur(100px);
            z-index: 2;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        
        /* Login Box Styles */
        .login-container {
            position: relative;
            z-index: 10;
            width: 440px;
            background: rgba(15, 23, 42, 0.65);
            border: 1px solid var(--glass-border);

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }
        .login-logo {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 0.1em;
            background: linear-gradient(135deg, #FFF, var(--secondary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .login-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }
        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 18px;
            font-family: var(--font-body);
            font-size: 15px;
            color: #FFF;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .input-field:focus {
            outline: none;
            border-color: var(--secondary-accent);
            background: rgba(0, 242, 254, 0.02);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.1);
        }
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-accent), #FF8A00);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 700;
            color: #FFF;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 10px;
            box-shadow: 0 4px 20px rgba(255, 91, 53, 0.2);
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 91, 53, 0.35);
        }
        .login-btn:active {
            transform: translateY(0);
        }
        .error-msg {
            color: #EF4444;
            font-size: 13.5px;
            font-weight: 500;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        
        /* Content Panel Styles */
        .content-container {

            z-index: 10;
            width: 100%;
            max-width: 1000px;
            padding: 60px 40px;
            display: none;

            border-radius: 8px;

            font-size: 13px;
            font-weight: 600;

            color: #EF4444;

        .present-btn {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);

        .present-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.45) !important;
            filter: brightness(1.15);
        }
        
        /* Premium Markdown Styles */
        .markdown-body {
            line-height: 1.8;
            font-size: 17px;
            color: #E2E8F0;

        .markdown-body h1 {

            font-size: 32px;
            margin-bottom: 25px;
            color: #FFF;
        }
        .markdown-body h2 {
            font-family: var(--font-display);
            font-size: 26px;
            font-weight: 700;

        .markdown-body h3 {

        .markdown-body ul, .markdown-body ol {

        .markdown-body li {

        .markdown-body blockquote {

        .markdown-body pre {

                    document.body.style.alignItems = 'flex-start'; // Allow natural scrolling
                    
                    // Render Markdown
                    document.getElementById('markdownContent').innerHTML = marked.parse(plaintext);
                    return true;
                }
            } catch (e) {
                console.error("Decryption exception:", e);
            }
            return false;
        }

        function handleLogout() {
            sessionStorage.removeItem('phoenix_advisor_key');
            location.reload();
        }

        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.innerHTML = msg;
            errorDiv.style.display = 'block';
            
            // Add error wiggle effect
            const loginBox = document.getElementById('loginBox');
            loginBox.style.animation = 'none';
            loginBox.offsetHeight; // Trigger reflow
            loginBox.style.animation = 'wiggle 0.3s ease-in-out';
        }
    </script>
    <style>
        @keyframes wiggle {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
    </style>
</body>
</html>
