<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧營運重構時程 ｜ 90天 Quick-Win 實施路線圖</title>
    <!-- 引入 Outfit (標題) 與 Inter (內文) 高階字型 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-midnight: #070913;
            --white: #FFFFFF;
            --gray-300: #CBD5E1;
            --gray-400: #9CA3AF;
            --phoenix-orange: #FF5B35;
            --phoenix-teal: #00F2FE;
            --phoenix-gold: #F5A623;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-midnight);
            color: var(--white);
            font-family: var(--font-body);
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            position: relative;
        }

        /* 奢華流光背景 */
        .grid-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 91, 53, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 254, 0.04) 0%, transparent 50%);
            z-index: 1;
            pointer-events: none;
        }

        /* 16:9 簡報舞台 */
        #stage {
            width: 1920px;
            height: 1080px;
            padding: 80px 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
        }

        /* 頁頂導航列 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 24px;
            margin-bottom: 40px;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand-badge {
            font-family: var(--font-display);
            font-size: 13px;
            font-weight: 800;
            color: var(--phoenix-orange);
            border: 1px solid rgba(255, 91, 53, 0.3);
            background: rgba(255, 91, 53, 0.06);
            padding: 6px 14px;
            border-radius: 30px;
            letter-spacing: 1px;
        }

        .logo-txt {
            font-family: var(--font-display);
            font-size: 15px;
            font-weight: 700;
            color: var(--white);
            letter-spacing: 0.5px;
        }

        .nav-right-tag {
            font-size: 13px;
            color: var(--phoenix-teal);
            font-weight: 600;
            background: rgba(0, 242, 254, 0.05);
            border: 1px solid rgba(0, 242, 254, 0.15);
            padding: 6px 14px;
            border-radius: 30px;
        }

        /* 頁面主要內容 */
        .content-body {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 頁底聲明列 */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 24px;
            margin-top: 40px;
            font-size: 13px;
            color: var(--gray-400);
        }

        .security-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--phoenix-gold);
            font-weight: 600;
        }

        /* 漸變文字與特效 */
        .text-gradient-orange {
            background: linear-gradient(135deg, var(--white) 30%, var(--phoenix-orange) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-gradient-teal {
            background: linear-gradient(135deg, var(--white) 30%, var(--phoenix-teal) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 動畫效果 */
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade {
            animation: slideInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.25s; }
        .delay-3 { animation-delay: 0.4s; }
        
        .slide-title-row {
            margin-bottom: 24px;
        }
        .slide-main-title {
            font-family: var(--font-display);
            font-size: 40px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .slide-subtitle {
            font-size: 18px;
            color: var(--gray-400);
        }
        .roadmap-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
            height: 520px;
        }
        .tab-btn-row {
            display: flex;
            gap: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 16px;
        }
        .tab-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            color: var(--gray-300);
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }
        .tab-btn.active {
            background: rgba(255, 91, 53, 0.08);
            border-color: var(--phoenix-orange);
            color: var(--white);
            box-shadow: 0 0 15px rgba(255, 91, 53, 0.2);
        }
        .roadmap-view-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            backdrop-filter: blur(16px);
            position: relative;
        }
        .roadmap-card-content {
            font-size: 18px;
            color: var(--gray-300);
            line-height: 1.8;
        }
        .gantt-chart-mock {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 24px;
        }
        .gantt-bar-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .gantt-lbl {
            width: 140px;
            font-size: 13px;
            color: var(--gray-400);
            font-weight: 600;
        }
        .gantt-bar {
            height: 12px;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            flex-grow: 1;
            position: relative;
            overflow: hidden;
        }
        .gantt-fill {
            height: 100%;
            border-radius: 6px;
            position: absolute;
            left: 0; top: 0;
            width: 0%;
            transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .gantt-fill.orange { background: var(--phoenix-orange); }
        .gantt-fill.teal { background: var(--phoenix-teal); }
        .gantt-fill.gold { background: var(--phoenix-gold); }
    
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div id="stage">
        <header class="animate-fade">
            <div class="logo-group">
                <span class="brand-badge">YUEPIN GROUP</span>
                <span class="logo-txt">PHOENIX AI 顧問 x [連鎖餐飲暨零售集團]</span>
            </div>
            <div class="nav-right-tag">B2B CORPORATE AI CONSULTING</div>
        </header>
        <div class="content-body">

            <div class="slide-title-row animate-fade">
                <h2 class="slide-main-title text-gradient-orange">智慧營運重構時程 ｜ 90天 Quick-Win 實施路線圖</h2>
                <p class="slide-subtitle">點擊下方日程分頁，檢視總部橘軌與門店藍軌雙向並進的實施日程</p>
            </div>
            <div class="roadmap-container">
                <!-- 分頁按鈕 -->
                <div class="tab-btn-row animate-fade delay-1">
    
                    <button class="tab-btn active" onclick="switchTab(0)">Month 1 (啟動期)</button>
        
                    <button class="tab-btn " onclick="switchTab(1)">Month 3 (試點期)</button>
        
                    <button class="tab-btn " onclick="switchTab(2)">Month 6 (全面上線)</button>
        
                </div>

                <!-- 分頁內容展示區 -->
                <div class="roadmap-view-panel animate-fade delay-2">
                    <p class="roadmap-card-content" id="tab-desc-text">Select a month to load.</p>
                    
                    <div class="gantt-chart-mock">
                        <div class="gantt-bar-row">
                            <span class="gantt-lbl">1. 數據備份與安全網閘</span>
                            <div class="gantt-bar"><div class="gantt-fill orange" id="bar1"></div></div>
                        </div>
                        <div class="gantt-bar-row">
                            <span class="gantt-lbl">2. 現場機台與特警部署</span>
                            <div class="gantt-bar"><div class="gantt-fill teal" id="bar2"></div></div>
                        </div>
                        <div class="gantt-bar-row">
                            <span class="gantt-lbl">3. 補助款申報核銷軌跡</span>
                            <div class="gantt-bar"><div class="gantt-fill gold" id="bar3"></div></div>
                        </div>
                    </div>
                </div>
            </div>

            <script>
                const tabData = [{"name": "Month 1 (啟動期)", "content": "<b>總部橘軌：</b>部署企業級 API 網閘與 Token 計費限制器，制定全員 AI 安全使用守則，隔離影子 AI 洩漏個資風險。<br><b>門店藍軌：</b>啟動 45 家門店店長 AI 變革倡議，建立對標基線並完成現行排班規則收集。"}, {"name": "Month 3 (試點期)", "content": "<b>總部橘軌：</b>對接台南大學與高科大產學合作，申報經濟部商業發展署 SIIR 補助計畫黃金計畫書，爭取補助轉型預算。<br><b>門店藍軌：</b>導入預測性智慧排班工具進行 5 家門店小規模試點，客流預測準確率調校達 85% 以上。"}, {"name": "Month 6 (全面上線)", "content": "<b>總部橘軌：</b>完成 ISO 42001 內部稽核研習，對齊 SIIR 計畫書專案補助款審計核銷黃金路徑。<br><b>門店藍軌：</b>智慧排班工具全面推廣至 45 家門店，「卓越服務之星」同儕激勵機制上線，排班工時節省 70%。"}];
                
                function switchTab(index) {
                    const buttons = document.querySelectorAll('.tab-btn');
                    buttons.forEach((b, i) => {
                        if (i === index) b.classList.add('active');
                        else b.classList.remove('active');
                    });
                    
                    document.getElementById('tab-desc-text').innerHTML = tabData[index].content;
                    
                    // 動態更新甘特圖模擬填充度
                    if (index === 0) {
                        document.getElementById('bar1').style.width = '80%';
                        document.getElementById('bar2').style.width = '10%';
                        document.getElementById('bar3').style.width = '0%';
                    } else if (index === 1) {
                        document.getElementById('bar1').style.width = '100%';
                        document.getElementById('bar2').style.width = '65%';
                        document.getElementById('bar3').style.width = '10%';
                    } else if (index === 2) {
                        document.getElementById('bar1').style.width = '100%';
                        document.getElementById('bar2').style.width = '100%';
                        document.getElementById('bar3').style.width = '95%';
                    }
                }
                
                // 初始化
                switchTab(0);
            </script>
    
        </div>
        <footer class="animate-fade delay-3">
            <div class="security-tag">🛡️ 本簡報所有關鍵商業細節及專利技術已完全進行深度去識別化處理</div>
            <div>PHOENIX AI CONSULTING &copy; 2026 ｜ PAGE 9 OF 10</div>
        </footer>
    </div>

    <!-- 原生無干擾等比例縮放引擎 (Fit Engine) -->
    <script>
        function fit() {
            const stage = document.getElementById('stage');
            const w = window.innerWidth;
            const h = window.innerHeight;
            const scale = Math.min(w / 1920, h / 1080);
            stage.style.transform = `scale(${scale})`;
            stage.style.left = `${(w - 1920 * scale) / 2}px`;
            stage.style.top = `${(h - 1080 * scale) / 2}px`;
            stage.style.transformOrigin = 'top left';
            stage.style.position = 'absolute';
        }
        window.addEventListener('resize', fit);
        window.addEventListener('load', fit);
    </script>
</body>
</html>
