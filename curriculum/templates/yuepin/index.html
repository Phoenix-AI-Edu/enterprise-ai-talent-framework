<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YUEPIN GROUP 高階客製化教材簡報播控器 ｜ PHOENIX AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #070913;
      --glass-bg: rgba(255, 255, 255, 0.02);
      --glass-border: rgba(255, 255, 255, 0.08);
      --phoenix-orange: #FF5B35;
      --phoenix-teal: #00F2FE;
    }

    * {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    body {
      background: var(--bg-deep);
      font-family: 'Inter', sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #stage {
      width: 1920px;
      height: 1080px;
      position: absolute;
      box-shadow: 0 50px 100px rgba(0,0,0,0.8);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg-deep);
      transition: opacity 0.3s ease;
    }

    /* 進度指示條 */
    .progress-bar-container {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 6px;
      background: rgba(255,255,255,0.05);
      z-index: 999;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--phoenix-orange), var(--phoenix-teal));
      transition: width 0.3s cubic-bezier(0.1, 0.8, 0.25, 1);
    }

    /* 快捷鍵控制指示 */
    .control-hint {
      position: absolute;
      bottom: 20px;
      right: 40px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      color: #9CA3AF;
      z-index: 1000;
      font-family: monospace;
      pointer-events: none;
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>

  <div id="stage">
    <iframe id="slide-frame" src="01-cover.html"></iframe>
    <div class="progress-bar-container">
      <div class="progress-fill" id="progress-indicator"></div>
    </div>
    <div class="control-hint">LEFT/RIGHT ARROWS OR SPACE TO NAVIGATE ｜ PRESS 'P' TO PRINT</div>
  </div>

  <script>
    const slides = ["01-cover.html", "02-dual-track.html", "03-dual-track.html", "04-dual-track.html", "05-dual-track.html", "06-interactive-roi.html", "07-dual-track.html", "08-dual-track.html", "09-interactive-roadmap.html", "10-next-steps.html"];
    let currentIndex = 0;

    const frame = document.getElementById('slide-frame');
    const indicator = document.getElementById('progress-indicator');

    function updateProgress() {
      const pct = ((currentIndex + 1) / slides.length) * 100;
      indicator.style.width = pct + '%';
    }

    function goToSlide(index) {
      if (index < 0 || index >= slides.length) return;
      
      // 淡出效果
      frame.style.opacity = 0;
      
      setTimeout(() => {
        currentIndex = index;
        frame.src = slides[currentIndex];
        
        frame.onload = () => {
          frame.style.opacity = 1;
        };
        
        updateProgress();
      }, 150);
    }

    // 鍵盤導航
    window.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
        if (currentIndex < slides.length - 1) {
          goToSlide(currentIndex + 1);
        }
      } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
        if (currentIndex > 0) {
          goToSlide(currentIndex - 1);
        }
      } else if (e.key === 'p' || e.key === 'P') {
        // 列印呼叫
        frame.contentWindow.print();
      }
    });

    // 全局防干擾聚焦
    window.addEventListener('click', () => {
      frame.focus();
    });

    // 確保等比例縮放舞台
    function fit() {
      const stage = document.getElementById('stage');
      const w = window.innerWidth;
      const h = window.innerHeight;
      const scale = Math.min(w / 1920, h / 1080);
      stage.style.transform = `scale(${scale})`;
      stage.style.left = `${(w - 1920 * scale) / 2}px`;
      stage.style.top = `${(h - 1080 * scale) / 2}px`;
    }
    window.addEventListener('resize', fit);
    window.addEventListener('load', () => {
      fit();
      updateProgress();
      frame.focus();
    });
  </script>
</body>
</html>
