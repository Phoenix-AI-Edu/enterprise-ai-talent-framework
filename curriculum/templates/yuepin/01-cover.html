<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服務業 AI 營運與人才培育解決方案</title>
    <!-- 引入 Outfit (標題) 與 Inter (內文) 高階字型 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-midnight: #070913;
            --white: #FFFFFF;
            --gray-300: #F8FAFC; /* High-contrast bright slate white */
            --gray-400: #E2E8F0; /* High-contrast bright slate grey-white */
            --phoenix-orange: #FF5B35;
            --phoenix-teal: #00F2FE;
            --phoenix-gold: #F5A623;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-midnight);
            color: var(--white);
            font-family: var(--font-body);
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            position: relative;
        }

        /* 奢華流光背景 */
        .grid-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 91, 53, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 254, 0.04) 0%, transparent 50%);
            z-index: 1;
            pointer-events: none;
        }

        /* 16:9 簡報舞台 */
        #stage {
            width: 1920px;
            height: 1080px;
            padding: 80px 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
        }

        /* 頁頂導航列 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 24px;
            margin-bottom: 40px;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand-badge {
            font-family: var(--font-display);
            font-size: 17px; /* Increased */
            font-weight: 800;
            color: var(--phoenix-orange);
            border: 1px solid rgba(255, 91, 53, 0.3);
            background: rgba(255, 91, 53, 0.06);
            padding: 8px 18px; /* Increased padding */
            border-radius: 30px;
            letter-spacing: 1px;
        }

        .logo-txt {
            font-family: var(--font-display);
            font-size: 20px; /* Increased */
            font-weight: 700;
            color: var(--white);
            letter-spacing: 0.5px;
        }

        .nav-right-tag {
            font-size: 17px; /* Increased */
            color: var(--phoenix-teal);
            font-weight: 600;
            background: rgba(0, 242, 254, 0.05);
            border: 1px solid rgba(0, 242, 254, 0.15);
            padding: 8px 18px; /* Increased padding */
            border-radius: 30px;
        }

        /* 頁面主要內容 */
        .content-body {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 頁底聲明列 */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 24px;
            margin-top: 40px;
            font-size: 16px; /* Increased */
            color: var(--gray-400);
        }

        .security-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--phoenix-gold);
            font-weight: 600;
        }

        /* 漸變文字與特效 */
        .text-gradient-orange {
            background: linear-gradient(135deg, var(--white) 30%, var(--phoenix-orange) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-gradient-teal {
            background: linear-gradient(135deg, var(--white) 30%, var(--phoenix-teal) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 動畫效果 */
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade {
            animation: slideInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.25s; }
        .delay-3 { animation-delay: 0.4s; }
        
        .cover-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100%;
            position: relative;
        }
        .cover-halo {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(255, 91, 53, 0.08) 0%, transparent 60%);
            z-index: -1;
            filter: blur(80px);
        }
        .cover-title {
            font-family: var(--font-display);
            font-size: 76px; /* Optimized massive executive scale */
            font-weight: 800;
            line-height: 1.25;
            margin-bottom: 24px;
            max-width: 1400px;
        }
        .cover-sub {
            font-size: 34px; /* Optimized massive executive scale */
            color: var(--gray-300);
            letter-spacing: 1px;
            max-width: 1100px;
            line-height: 1.6;
        }
    
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div id="stage">
        <header class="animate-fade">
            <div class="logo-group">
                <span class="brand-badge">YUEPIN GROUP</span>
                <span class="logo-txt">PHOENIX AI 顧問 x [連鎖餐飲暨零售集團]</span>
            </div>
            <div class="nav-right-tag">B2B CORPORATE AI CONSULTING</div>
        </header>
        <div class="content-body">

            <div class="cover-container">
                <div class="cover-halo animate-fade"></div>
                <h1 class="cover-title text-gradient-orange animate-fade delay-1">服務業 AI 營運與人才培育解決方案</h1>
                <p class="cover-sub animate-fade delay-2">專屬 連鎖餐飲與多零售門店集團 執行長 閣下 ｜ 策略研討手冊</p>
            </div>
    
        </div>
        <footer class="animate-fade delay-3">
            <div class="security-tag">🛡️ 本簡報所有關鍵商業細節及專利技術已完全進行深度去識別化處理</div>
            <div>PHOENIX AI CONSULTING &copy; 2026 ｜ PAGE 1 OF 10</div>
        </footer>
    </div>

    <!-- 原生無干擾等比例縮放引擎 (Fit Engine) -->
    <script>
        function fit() {
            const stage = document.getElementById('stage');
            const w = window.innerWidth;
            const h = window.innerHeight;
            const scale = Math.min(w / 1920, h / 1080);
            stage.style.transform = `scale(${scale})`;
            stage.style.left = `${(w - 1920 * scale) / 2}px`;
            stage.style.top = `${(h - 1080 * scale) / 2}px`;
            stage.style.transformOrigin = 'top left';
            stage.style.position = 'absolute';
        }
        window.addEventListener('resize', fit);
        window.addEventListener('load', fit);
    </script>
</body>
</html>
