    <script type="text/markdown" id="rawMarkdown"># 鋼鐵製品廠 AI 視覺檢測與一線變革實踐報告

## 📌 背景說明
本案目標為協助南部某中型鋼鐵製品廠，將傳統人工目視缺陷檢測升級為 AI 視覺檢測。該廠長期面臨高漏檢率（約 8%）及客訴頻繁的痛點。然而，在系統引進初期，因未考量現場作業人員的心理抗拒與系統操作複雜度，導致資料標記停擺，漏檢率甚至一度惡化。

## ⚠️ 一線變革阻力與痛點分析
1. **老員工的監視焦慮**：現場資深領班與技術工對新引入的平板界面極度排斥，甚至將其視為管理高層用於監視工時與懲處出錯的「數位電子鎖」。
2. **操作介面過於繁瑣**：原設計之標記系統需要員工在觸控螢幕上執行多個選擇與文字登錄步驟，對於習慣粗重鋼鐵作業、戴防護手套的工人而言極為不便。

## 🛠️ 鳳凰顧問解決方案
*   **極簡介面改造**：孟顧問親臨現場，將平板標記畫面精簡為只有「紅燈（瑕疵）」與「綠燈（合格）」兩個大型防呆按鈕，免除繁雜的文字輸入。
*   **變革管理與激勵機制**：策略長重組變革管理考核指標，取消任何可能與出錯掛鉤的扣分制，改為以「標記貢獻度」發放產線季度安全獎金，並透過領班溝通大會，解除「被監視」的恐懼，轉化為「AI 協作防錯」的共識。

## 📈 專案成效 (ROI)
*   **品質改善**：缺陷漏檢率由 8% 驟降至 **0.5% 以下**，出貨客訴歸零。
*   **效率提升**：現場一線數據標記與反饋效率提升 **150%**。
*   **財務收益**：每年因客訴賠償及重工包裝成本減少，挽回損失達 **NT$ 180 萬**。</script>

    <script>
        // Set marked.js options
        marked.setOptions({{
            gfm: true,
            breaks: true,
            headerIds: true,
            mangle: false
        }});

        // Render Markdown
        const mdText = document.getElementById('rawMarkdown').textContent;
        const htmlContent = marked.parse(mdText);
        document.getElementById('content').innerHTML = htmlContent;

        // Extract and format Mermaid code blocks for Mermaid.js rendering
        const codeBlocks = document.querySelectorAll('code.language-mermaid');
        codeBlocks.forEach(codeBlock => {{
            const pre = codeBlock.parentElement;
            const mermaidDiv = document.createElement('div');
            mermaidDiv.className = 'mermaid';
            mermaidDiv.textContent = codeBlock.textContent.trim();
            pre.replaceWith(mermaidDiv);
        }});

        // Initialize and run Mermaid
        mermaid.initialize({{
            startOnLoad: false,
            theme: 'dark',
            securityLevel: 'loose',
            themeVariables: {{
                background: '#070913',
                primaryColor: '#1F4E78',
                secondaryColor: '#FF5B35',
                tertiaryColor: '#E8F8F5'
            }}
        }});
        mermaid.run();
    </script>
