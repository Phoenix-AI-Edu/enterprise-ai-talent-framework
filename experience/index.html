  <style>
    :root {
      --phoenix-dark: #0B0B16;
      --phoenix-mid: #121226;
      --phoenix-accent: #E94560;
      --phoenix-accent-rgb: 233, 69, 96;
      --phoenix-teal: #00F2FE;
      --phoenix-gold: #F5A623;
      --white: #FFFFFF;
      --gray-300: #DDE2E5;
      --gray-400: #A5B1B8;
      --gray-600: #5A6A75;
      --glass-bg: rgba(18, 18, 38, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-hover: rgba(255, 255, 255, 0.12);
      --font-display: 'Outfit', 'Noto Sans TC', sans-serif;
      --font-body: 'Inter', 'Noto Sans TC', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      background-color: var(--phoenix-dark);
      color: var(--white);
      font-family: var(--font-body);
      line-height: 1.6;
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: radial-gradient(circle at 50% -20%, #201a35 0%, #0b0b16 60%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; text-decoration: none; transition: all 0.25s ease; }
    img, svg { max-width: 100%; height: auto; vertical-align: middle; }

    .container {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ─── Header / 返回首頁 ─── */
    .experience-header {
      padding: 24px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .back-link {
      color: var(--gray-400);
      font-size: 14px;
    }
    .back-link:hover { color: var(--white); }
    .logo-mark {
      color: var(--phoenix-accent);
      font-weight: 800;
      font-family: var(--font-display);
      font-size: 20px;
      letter-spacing: 0.4px;
    }

    /* ─── Hero ─── */
    .hero {
      padding-top: 40px;
      padding-bottom: 60px;
      position: relative;
      overflow: hidden;
      text-align: center;
    }
    .hero-glow-1 {
      position: absolute;
      top: -20%;
      left: 15%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(var(--phoenix-accent-rgb), 0.12) 0%, rgba(0,0,0,0) 70%);
      pointer-events: none;
      z-index: 0;
    }
    .hero-glow-2 {
      position: absolute;
      bottom: -10%;
      right: 10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 242, 254, 0.08) 0%, rgba(0,0,0,0) 70%);
      pointer-events: none;
      z-index: 0;
    }
    .hero-content { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; }
    .hero-title {
      font-family: var(--font-display);
      font-size: 46px;
      font-weight: 800;
      line-height: 1.25;
      margin-bottom: 18px;
      letter-spacing: -0.3px;
    }
    .hero-desc {
      font-size: 17px;
      color: var(--gray-400);
      max-width: 760px;
      margin: 0 auto;
      line-height: 1.75;
    }

    /* ─── Solutions Grid ─── */
    .solutions-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 22px;
    }

    .solution-card {
      flex: 1 1 320px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      padding: 26px 24px;
      backdrop-filter: blur(12px);
      transition: all 0.28s ease;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .solution-card:hover {
      border-color: rgba(255,255,255,0.18);
      background: var(--glass-hover);
      transform: translateY(-2px);
    }

    .solution-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .solution-name {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.3;
    }

    .solution-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid rgba(var(--phoenix-accent-rgb), 0.25);
      background: rgba(var(--phoenix-accent-rgb), 0.08);
      color: var(--phoenix-accent);
      white-space: nowrap;
    }

    .solution-subtitle {
      color: var(--gray-400);
      font-size: 14px;
    }

    .solution-highlights {
      font-size: 13.5px;
      color: var(--gray-300);
      line-height: 1.65;
      list-style: none;
      margin-top: 4px;
      padding-left: 4px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .solution-highlights li {
      position: relative;
      padding-left: 18px;
    }

    .solution-highlights li::before {
      content: '✦';
      position: absolute;
      left: 0;
      color: var(--phoenix-teal);
      font-size: 11px;
    }

    .solution-compliance {
      font-size: 12.5px;
      color: var(--gray-400);
      border-top: 1px solid rgba(255,255,255,0.04);
      padding-top: 12px;
    }

    .solution-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 6px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      border: none;
      transition: all 0.25s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--phoenix-accent) 0%, #c02d48 100%);
      color: var(--white);
      box-shadow: 0 6px 22px rgba(var(--phoenix-accent-rgb), 0.32);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 26px rgba(var(--phoenix-accent-rgb), 0.45);
    }

    .btn-secondary {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--white);
      backdrop-filter: blur(12px);
    }

    .btn-secondary:hover {
      background: var(--glass-hover);
      border-color: rgba(255,255,255,0.22);
      transform: translateY(-2px);
    }

    /* ─── Consent text under CTA ─── */
    .consent-text {
      font-size: 12px;
      color: var(--gray-600);
      margin-top: 10px;
      line-height: 1.5;
    }

    .consent-text a { color: var(--gray-400); text-decoration: underline; }
    .consent-text a:hover { color: var(--phoenix-teal); }

    /* ─── Footer ─── */
    .experience-footer {
      margin-top: auto;
      padding: 40px 0 28px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
    }

    .footer-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
    }

    .footer-links { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
    .footer-link {
      color: var(--gray-400);
      font-size: 13px;
    }
    .footer-link:hover { color: var(--white); text-decoration: none; }

    .footer-copy { font-size: 12px; color: var(--gray-600); }

    .footer-consent {
      max-width: 820px;
      font-size: 12px;
      color: var(--gray-600);
      text-align: center;
    }

    .footer-consent a { color: #0ea5e9; text-decoration: underline; }
    .footer-consent a:hover { color: var(--phoenix-teal); }

    @media (max-width: 720px) {
      .hero-title { font-size: 30px; }
      .solution-actions { flex-direction: column; align-items: stretch; }
      .solution-card { flex: 1 1 100%; }
    }
  </style>

  <div class="container">

    </header>

    <section class="hero">
      <div class="hero-glow-1"></div>
      <div class="hero-glow-2"></div>
      <div class="hero-content">
        <h1 class="hero-title">AI 解決方案體驗區</h1>
        <p class="hero-desc">我們提供最小資料蒐集的互動式 Pilot Demo，協助企業在安全可控的環境中驗證 AI 落地架構與執行節奏。所有展示場景皆為去識別化設計，未揭露任何真實客戶名稱或系統規格。</p>

    <section style="margin-bottom: 40px;">

      </div>
      <div class="footer-links">
        <a href="../index.html" class="footer-link">回首頁</a>
        <a href="../privacy.html" class="footer-link">隱私權政策</a>
      </div>
      <div class="footer-copy">© 2026 鳳凰 AI 顧問團隊。著作權所有。</div>
    </div>

  <script src="./solutions_data.js"></script>
  <script>
    (function () {
      var solutions = window.EXPERIENCE_SOLUTIONS || [];
      var grid = document.getElementById('solutions-grid');

      function trackSolutionView(solution) {
        var payload = {
          event: 'experience_solution_view',
          solution_id: solution.id,
          solution_title: solution.title,
          event_category: solution.contact_category,
          event_label: solution.contact_label,
          event_callback: undefined
        };
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push(payload);

        if (typeof window.gtag === 'function') {
          window.gtag('event', 'experience_solution_view', {
            event_category: 'experience_cta',
            event_label: 'experience_solution_view',
            solution_id: solution.id
          });
        }
      }

      solutions.forEach(function (s) {
        var card = document.createElement('div');
        card.className = 'solution-card';

        var highlightsHtml = (s.highlights || []).map(function (h) {
          return '<li>' + h + '</li>';
        }).join('');

        card.innerHTML = '<div>' +
          '<div class="solution-header" data-ga="experience_cta" data-ga-event="experience_solution_view" data-ga-solution-id="' + s.id + '">' +
            '<div class="solution-name">' + s.title + '</div>' +
            '<div class="solution-badge">' + s.status + '</div>' +
          '</div>' +
          '<div class="solution-subtitle">' + (s.subtitle || '') + '</div>' +
          '<ul class="solution-highlights">' + highlightsHtml + '</ul>' +
          (s.compliance_note ? '<div class="solution-compliance">' + s.compliance_note + '</div>' : '') +
        '</div>' +
        '<div>' +
          '<div class="solution-actions">' +
            '<a href="' + s.cta_href + '" class="btn btn-primary" data-ga="experience_cta" data-ga-event="experience_solution_view" data-ga-solution-id="' + s.id + '">' + s.cta_text + '</a>' +
            (s.pilot_program_href ? '<a href="' + s.pilot_program_href + '" class="btn btn-secondary" data-ga="experience_cta" data-ga-event="experience_demo_request_click" data-ga-solution-id="' + s.id + '">' + s.pilot_program_text + '</a>' : '') +
          '</div>' +
          '<div class="consent-text">點擊提交表單即表示您已詳閱並同意<a href="../privacy.html">《個人資料保護與隱私權政策告知書》</a></div>' +
        '</div>';

        card.addEventListener('click', function (e) {
          var target = e.target.closest('a[data-ga]');
          if (!target) return;

          var category = target.getAttribute('data-ga');
          var eventLabel = target.getAttribute('data-ga-event');
          var solutionId = target.getAttribute('data-ga-solution-id');

          try {
            window.dataLayer.push({
              event: 'experience_cta_click',
              event_category: category,
              event_label: eventLabel,
              solution_id: solutionId,
              cta_href: target.getAttribute('href')
            });
          } catch (err) {
            // suppress analytics tracking errors in static page
          }

          if (typeof window.gtag === 'function') {
            window.gtag('event', eventLabel, {
              event_category: category,
              event_label: eventLabel,
              solution_id: solutionId,
              cta_href: target.getAttribute('href')
            });
          }
        });

        grid.appendChild(card);
        trackSolutionView(s);
      });
    })();
  </script>
